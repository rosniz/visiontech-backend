name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            set -e

            echo "📂 Aller dans le dossier du projet..."
            cd /var/www/visiontech-backend

            echo "⬇️  Pull des dernières modifications..."
            git reset --hard HEAD
            git pull origin main

            echo "🐳 Build et redémarrage des conteneurs..."
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate --remove-orphans

            echo "🧹 Nettoyage des images Docker inutiles..."
            docker image prune -f

            echo "✅ Déploiement terminé avec succès !"

      - name: ❌ Notify on failure
        if: failure()
        run: |
          echo "Le déploiement a échoué. Vérifier les logs GitHub Actions."