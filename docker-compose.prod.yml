version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: visiontech_db_prod
    restart: always
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=visiontech_db
      - POSTGRES_USER=visiontech_user
      - POSTGRES_PASSWORD=Rosni@2025
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visiontech_user -d visiontech_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - visiontech_internal

  redis:
    image: redis:7-alpine
    container_name: visiontech_redis_prod
    restart: always
    networks:
      - visiontech_internal

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visiontech_web_prod
    restart: always
    # Daphne à la place de Gunicorn — supporte HTTP + WebSocket
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && /root/.local/bin/daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - static_prod:/app/staticfiles
      - media_prod:/app/media
    expose:
      - "8000"
    env_file:
      - .env.prod
    environment:
      - DEBUG=False
      - REDIS_URL=redis://visiontech_redis_prod:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - visiontech_internal

  nginx:
    image: nginx:alpine
    container_name: visiontech_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/visiontech.vision.conf:/etc/nginx/conf.d/default.conf:ro
      - static_prod:/app/staticfiles:ro
      - media_prod:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - visiontech_internal

volumes:
  postgres_prod_data:
  static_prod:
  media_prod:

networks:
  visiontech_internal:
    driver: bridge